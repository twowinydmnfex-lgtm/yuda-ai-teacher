      const drawGateSymbol=(type,cx,cy)=>{
        ctx.strokeStyle=purple;ctx.lineWidth=2.2;ctx.fillStyle='rgba(60,52,137,0.10)';
        if(type==='AND'){
          ctx.beginPath();ctx.moveTo(cx-gw/2,cy-gh/2);ctx.lineTo(cx,cy-gh/2);ctx.arc(cx,cy,gh/2,Math.PI*1.5,Math.PI*0.5);ctx.lineTo(cx-gw/2,cy+gh/2);ctx.closePath();ctx.fill();ctx.stroke();
        } else if(type==='OR'||type==='XOR'||type==='XNOR'){
          ctx.beginPath();ctx.moveTo(cx-gw/2,cy-gh/2);ctx.quadraticCurveTo(cx+gw*0.1,cy,cx-gw/2,cy+gh/2);ctx.quadraticCurveTo(cx,cy+gh/2+8,cx+gw/2,cy);ctx.quadraticCurveTo(cx,cy-gh/2-8,cx-gw/2,cy-gh/2);ctx.fill();ctx.stroke();
          if(type==='XOR'||type==='XNOR'){ctx.beginPath();ctx.moveTo(cx-gw/2-6,cy-gh/2);ctx.quadraticCurveTo(cx-gw*0.35,cy,cx-gw/2-6,cy+gh/2);ctx.stroke();}
        } else if(type==='NOT'){
          ctx.beginPath();ctx.moveTo(cx-gw/2,cy-gh/2);ctx.lineTo(cx+gw/2-8,cy);ctx.lineTo(cx-gw/2,cy+gh/2);ctx.closePath();ctx.fill();ctx.stroke();
          ctx.beginPath();ctx.arc(cx+gw/2-4,cy,4,0,Math.PI*2);ctx.stroke();
        } else { // NAND NOR
          if(type==='NAND'){ctx.beginPath();ctx.moveTo(cx-gw/2,cy-gh/2);ctx.lineTo(cx,cy-gh/2);ctx.arc(cx,cy,gh/2,Math.PI*1.5,Math.PI*0.5);ctx.lineTo(cx-gw/2,cy+gh/2);ctx.closePath();ctx.fill();ctx.stroke();}
          else{ctx.beginPath();ctx.moveTo(cx-gw/2,cy-gh/2);ctx.quadraticCurveTo(cx+gw*0.1,cy,cx-gw/2,cy+gh/2);ctx.quadraticCurveTo(cx,cy+gh/2+8,cx+gw/2,cy);ctx.quadraticCurveTo(cx,cy-gh/2-8,cx-gw/2,cy-gh/2);ctx.fill();ctx.stroke();}
          ctx.beginPath();ctx.arc(cx+gw/2+4,cy,4,0,Math.PI*2);ctx.stroke();
        }
        LX(ctx,W,H,type,cx,cy,purple,13,true);
      };
      drawGateSymbol(gateType,gx,gy);
      // 輸入線
      const inY=n===1?[gy]:[gy-14,gy+14];
      inY.forEach((y,i)=>{
        ctx.strokeStyle='#64748B';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(gx-gw/2-30,y);ctx.lineTo(gx-gw/2,y);ctx.stroke();
        LX(ctx,W,H,inputs[i]||('A'+i),gx-gw/2-38,y,'#1E293B',12,true);
      });
      ctx.strokeStyle='#64748B';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(gx+gw/2+(gateType.includes('N')||gateType==='NOT'?8:0),gy);ctx.lineTo(gx+gw/2+36,gy);ctx.stroke();
      LX(ctx,W,H,'Y',gx+gw/2+44,gy,'#1E293B',12,true);
      LX(ctx,W,H,'Y='+expression,gx,gy+gh/2+22,purple,11);
      // ── 右側：真值表 ──
      const tLeft=W*0.52,tTop=50,colW=36,rowH=26;
      const headers=[...inputs,'Y'];
      const tW=headers.length*colW+8,tH=(rows+1)*rowH+8;
      // 表格底框
      ctx.fillStyle='rgba(255,255,255,0.9)';ctx.strokeStyle='rgba(60,52,137,0.3)';ctx.lineWidth=0.8;
      ctx.beginPath();ctx.roundRect(tLeft,tTop,tW,tH,6);ctx.fill();ctx.stroke();
      // 表頭
      ctx.fillStyle='rgba(60,52,137,0.12)';ctx.beginPath();ctx.roundRect(tLeft,tTop,tW,rowH,6);ctx.fill();
      headers.forEach((h,i)=>{
        ctx.fillStyle=i===headers.length-1?purple:'#1E293B';ctx.font='600 12px \'Noto Sans TC\',system-ui,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(h,tLeft+colW*i+colW/2+4,tTop+rowH/2);
      });
      // 行
      const showRows=pi===0?Math.ceil(rows*(0.4+e*0.6)):rows;
      table.slice(0,showRows).forEach((row,ri)=>{
        const ry=tTop+(ri+1)*rowH;
        if(ri%2===0){ctx.fillStyle='rgba(240,245,251,0.7)';ctx.fillRect(tLeft+1,ry,tW-2,rowH);}
        row.inputs.forEach((v,ci)=>{
          ctx.fillStyle=v===1?blue:'#64748B';ctx.font='500 13px \'Noto Sans TC\',system-ui,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillText(v,tLeft+colW*ci+colW/2+4,ry+rowH/2);
        });
        const outCol=headers.length-1;
        ctx.fillStyle=row.output===1?green:red;ctx.font='700 13px \'Noto Sans TC\',system-ui,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(row.output,tLeft+colW*outCol+colW/2+4,ry+rowH/2);
        // 分隔線
        ctx.strokeStyle='rgba(60,52,137,0.1)';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(tLeft,ry);ctx.lineTo(tLeft+tW,ry);ctx.stroke();
      });
      // 輸入/輸出分隔線
      ctx.strokeStyle='rgba(60,52,137,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(tLeft+colW*(headers.length-1)+4,tTop);ctx.lineTo(tLeft+colW*(headers.length-1)+4,tTop+tH);ctx.stroke();
      if(pi===PN-1&&e>0.6){
        const ones=table.filter(r=>r.output===1).length;
        tBox(ctx,W,H,['輸出為1的組合：'+ones+'/'+rows+'種'],W*0.28,H*0.85,[purple],11);
        ansBox(ctx,W,H,ans);
      }
    });
  }

  // ── 會計T字帳/借貸分錄 accounting ─────────────────────────
  // 商業管理群：借貸分錄、T字帳、會計方程式
  if(gtype==='accounting'){
    // graphParams: {accounts:[{name,debit,credit}], equation:{assets,liabilities,equity}}
    const accounts=Array.isArray(gp.accounts)&&gp.accounts.length>0
      ?gp.accounts
      :[{name:'帳戶',debit:gp.debit||0,credit:gp.credit||0}];
    const eq=gp.equation||null;
    const acColors=[blue,red,green,purple,amber];
    return phases.map((_,pi)=>(ctx,W,H,e)=>{
      ctx.fillStyle='#F0F5FB';ctx.fillRect(0,0,W,H);
      ctx.fillStyle=amber;ctx.beginPath();ctx.roundRect(W/2-56,14,112,26,13);ctx.fill();
      ctx.fillStyle='#fff';ctx.font='500 11px \'Noto Sans TC\',system-ui,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('步驟 '+(pi+1)+' / '+PN,W/2,27);
      const step=phases[pi]||{};
      // ── pi==0：會計方程式 or 分錄說明 ──
      if(pi===0){
        const eqY=H*0.38;
        if(eq){
          // 畫會計恆等式
          const parts=[{label:'資產',val:eq.assets,col:blue},{label:'=',val:'',col:'#64748B'},{label:'負債',val:eq.liabilities,col:red},{label:'+',val:'',col:'#64748B'},{label:'業主權益',val:eq.equity,col:green}];
          let curX=30;
          parts.forEach(p=>{
            ctx.fillStyle=p.col;ctx.font=(p.val?'600':'400')+' 14px \'Noto Sans TC\',system-ui,sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';
            ctx.fillText(p.label,curX,eqY);
            if(p.val!==undefined&&p.val!==''){
              ctx.fillStyle=p.col;ctx.font='400 12px \'Noto Sans TC\',system-ui,sans-serif';
              ctx.fillText('$'+p.val,curX,eqY+20);
            }
            curX+=ctx.measureText(p.label).width+16;
          });
        }
        // 分錄說明
        const bodyText=(step.formula||'').replace(/\*\*([^*]+)\*\*/g,'$1').replace(/#{1,6}\s*/g,'');
        const bx=16,by=54,bw=W-32,bh=H*0.38-10;
        ctx.fillStyle='rgba(133,79,11,0.08)';ctx.strokeStyle=amber;ctx.lineWidth=0.8;
        ctx.beginPath();ctx.roundRect(bx,by,bw,bh,8);ctx.fill();ctx.stroke();
        ctx.fillStyle=amber;ctx.font='600 13px \'Noto Sans TC\',system-ui,sans-serif';ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText(step.title||'分錄說明',bx+12,by+10);
        ctx.fillStyle='#1E3A5F';ctx.font='12px \'Noto Sans TC\',system-ui,sans-serif';
        let curY=by+32;
        bodyText.split(/\n|；/).forEach(seg=>{if(!seg.trim()||curY>by+bh-10)return;ctx.fillText(seg.slice(0,40),bx+12,curY);curY+=20;});
      }
      // ── pi>=1：T字帳 ──
      if(pi>=1){
        const showN=Math.min(pi,accounts.length);
        const tW=Math.min((W-40)/showN,180);
        const tH=Math.min(H*0.55,160);
        const tTop=H*0.12,gap=(W-40-tW*showN)/(showN+1);
        accounts.slice(0,showN).forEach((acc,ai)=>{
          const tx=40+gap*(ai+1)+tW*ai,ty=tTop;
          const col2=acColors[ai%5];
          // T字外框
          ctx.fillStyle='rgba(255,255,255,0.92)';ctx.strokeStyle=col2;ctx.lineWidth=1.2;
          ctx.beginPath();ctx.roundRect(tx,ty,tW,tH,6);ctx.fill();ctx.stroke();
          // 帳戶名稱欄
          ctx.fillStyle=col2;ctx.beginPath();ctx.roundRect(tx,ty,tW,24,6);ctx.fill();
          ctx.fillStyle='#fff';ctx.font='600 11px \'Noto Sans TC\',system-ui,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(acc.name||'帳戶',tx+tW/2,ty+12);
          // 借/貸標題
          ctx.fillStyle='#334155';ctx.font='500 11px \'Noto Sans TC\',system-ui,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillText('借方',tx+tW*0.25,ty+38);ctx.fillText('貸方',tx+tW*0.75,ty+38);
          // T字中線
          ctx.strokeStyle=col2+'66';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(tx+tW/2,ty+28);ctx.lineTo(tx+tW/2,ty+tH);ctx.stroke();
          ctx.beginPath();ctx.moveTo(tx,ty+50);ctx.lineTo(tx+tW,ty+50);ctx.stroke();
          // 借方金額
          if(acc.debit){
            ctx.fillStyle=blue;ctx.font='500 13px \'Noto Sans TC\',system-ui,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
            ctx.fillText('$'+acc.debit,tx+tW*0.25,ty+70);
          }
          // 貸方金額
          if(acc.credit){
            ctx.fillStyle=red;ctx.font='500 13px \'Noto Sans TC\',system-ui,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
            ctx.fillText('$'+acc.credit,tx+tW*0.75,ty+70);
          }
          // 餘額
          const bal=((acc.debit||0)-(acc.credit||0));
          const balStr=(bal>=0?'借餘 $'+bal:'貸餘 $'+Math.abs(bal));
          ctx.fillStyle=bal>=0?blue:red;ctx.font='600 11px \'Noto Sans TC\',system-ui,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillText(balStr,tx+tW/2,ty+tH-14);
          // 餘額底線
          ctx.strokeStyle=col2+'44';ctx.lineWidth=0.8;ctx.beginPath();ctx.moveTo(tx+8,ty+tH-26);ctx.lineTo(tx+tW-8,ty+tH-26);ctx.stroke();
        });
        // 步驟說明框（底部）
        const bodyText=(step.formula||'').replace(/\*\*([^*]+)\*\*/g,'$1').replace(/#{1,6}\s*/g,'');
        const bx=16,bfy=H-68,bfw=W-32,bfh=58;
        ctx.fillStyle='rgba(255,255,255,0.92)';ctx.strokeStyle=amber;ctx.lineWidth=0.8;
        ctx.beginPath();ctx.roundRect(bx,bfy,bfw,bfh,7);ctx.fill();ctx.stroke();
        ctx.fillStyle=amber;ctx.font='600 12px \'Noto Sans TC\',system-ui,sans-serif';ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText(step.title||'',bx+10,bfy+8);
        ctx.fillStyle='#1E3A5F';ctx.font='12px \'Noto Sans TC\',system-ui,sans-serif';
        const ft=bodyText.slice(0,50);ctx.fillText(ft,bx+10,bfy+28);
        if(bodyText.length>50)ctx.fillText(bodyText.slice(50,100),bx+10,bfy+44);
      }
      if(pi===PN-1&&e>0.5)ansBox(ctx,W,H,ans);
    });
  }

  // ── 電晶體特性曲線 transistor ─────────────────────────────
  // 電機電子群：BJT/FET 輸出特性曲線、工作點
  if(gtype==='transistor'){
    const type2=gp.type||'BJT'; // BJT or FET
    const VCC=gp.VCC||12,RC=gp.RC||2,IB=gp.IB||0.04,hFE=gp.hFE||100;
    const IC_sat=parseFloat((VCC/RC).toFixed(2));
    const IC_Q=parseFloat((hFE*IB).toFixed(2));
    const VCE_Q=parseFloat((VCC-IC_Q*RC).toFixed(2));
    const curves=gp.curves||[0.02,0.04,0.06,0.08].map(ib=>({ib,ic:hFE*ib}));
    return phases.map((_,pi)=>(ctx,W,H,e)=>{
      ctx.fillStyle='#F0F5FB';ctx.fillRect(0,0,W,H);
      const ox=64,oy=H-52,pw=W-90,ph=H-80;
      const scx=pw/Math.max(VCC*1.2,10),scy=ph/Math.max(IC_sat*1.4,1);
      // 步驟標籤
      ctx.fillStyle='#A32D2D';ctx.beginPath();ctx.roundRect(W/2-56,14,112,26,13);ctx.fill();
      ctx.fillStyle='#fff';ctx.font='500 11px \'Noto Sans TC\',system-ui,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('步驟 '+(pi+1)+' / '+PN,W/2,27);
      // 座標軸
      arrowX(ctx,ox,oy,ox+pw+14,oy,'#64748B',1.5);
      arrowX(ctx,ox,oy,ox,oy-ph-14,'#64748B',1.5);
      LX(ctx,W,H,type2==='FET'?'VDS (V)':'VCE (V)',ox+pw+24,oy,'#64748B',11);
      LX(ctx,W,H,type2==='FET'?'ID (mA)':'IC (mA)',ox,oy-ph-22,'#64748B',11);
      LX(ctx,W,H,'O',ox-14,oy+12,'#64748B',11);
      // 刻度
      for(let v=2;v<=VCC*1.2;v+=2){ctx.strokeStyle='#E2E8F0';ctx.lineWidth=0.7;ctx.beginPath();ctx.moveTo(ox+v*scx,oy-4);ctx.lineTo(ox+v*scx,oy-ph);ctx.stroke();LX(ctx,W,H,v+'',ox+v*scx,oy+12,'#94A3B8',10);}
      // 特性曲線
      if(pi>=0){
        const showC=pi===0?Math.ceil(curves.length*e):curves.length;
        curves.slice(0,showC).forEach((c,ci)=>{
          const ic=c.ic;const icPx=oy-ic*scy;
          ctx.strokeStyle=`rgba(${60+ci*40},${80+ci*20},${180-ci*20},0.75)`;ctx.lineWidth=1.8;
          ctx.beginPath();ctx.moveTo(ox+0.3*scx,icPx+6);ctx.quadraticCurveTo(ox+1.2*scx,icPx,ox+VCC*1.15*scx,icPx*(pi===0&&ci===showC-1?lerp(1,1,e):1));ctx.stroke();
          const ibLabel=type2==='FET'?'VGS='+(c.ib*25).toFixed(0)+'V':(type2==='BJT'?'IB='+(c.ib*1000).toFixed(0)+'μA':'');
          LX(ctx,W,H,ibLabel,ox+pw*0.85,icPx-8,`rgba(${60+ci*40},${80+ci*20},${180-ci*20},1)`,10);
        });
      }
      // 直流負載線
      if(pi>=1){
        ctx.strokeStyle='#A32D2D';ctx.lineWidth=2;ctx.setLineDash([6,4]);
        ctx.beginPath();ctx.moveTo(ox,oy-IC_sat*scy*(pi===1?e:1));ctx.lineTo(ox+VCC*scx*(pi===1?e:1),oy);ctx.stroke();
        ctx.setLineDash([]);
        LX(ctx,W,H,'直流負載線',ox+VCC*scx*0.5,oy-IC_sat*scy*0.5-14,red,11,true);
        LX(ctx,W,H,'IC_sat='+IC_sat+'mA',ox-6,oy-IC_sat*scy-10,red,11);
        LX(ctx,W,H,'VCC='+VCC+'V',ox+VCC*scx,oy+14,red,11);
      }
      // 工作點Q
      if(pi>=2){
        const qx=ox+VCE_Q*scx,qy=oy-IC_Q*scy;
        ctx.fillStyle=green;ctx.beginPath();ctx.arc(qx,qy,7*(pi===2?e:1),0,Math.PI*2);ctx.fill();
        ctx.strokeStyle=green;ctx.lineWidth=1;ctx.setLineDash([3,3]);
        ctx.beginPath();ctx.moveTo(qx,oy);ctx.lineTo(qx,qy);ctx.stroke();
        ctx.beginPath();ctx.moveTo(ox,qy);ctx.lineTo(qx,qy);ctx.stroke();
        ctx.setLineDash([]);
        LX(ctx,W,H,'Q',qx+16,qy-14,green,13,true);
        LX(ctx,W,H,'VCE_Q='+VCE_Q+'V',ox+VCE_Q*scx,oy+14,green,11);
        LX(ctx,W,H,'IC_Q='+IC_Q+'mA',ox-6,oy-IC_Q*scy-10,green,11);
        if(pi===PN-1){
          tBox(ctx,W,H,['Q點：VCE='+VCE_Q+'V','IC='+IC_Q+'mA'],W*0.78,H*0.22,[green,green],11);
          if(e>0.6)ansBox(ctx,W,H,ans||'VCE='+VCE_Q+'V，IC='+IC_Q+'mA');
        }
      }
    });
  }

return phases.map((_,pi)=>(ctx,W,H,e)=>{
    ctx.fillStyle='#F0F5FB';ctx.fillRect(0,0,W,H);
    const step=phases[pi]||{};
    const colors=['#0C447C','#854F0B','#085041','#3C3489','#A32D2D','#1D9E75'];
    const col=colors[pi%colors.length];
    // 步驟標籤
    ctx.fillStyle=col;ctx.beginPath();ctx.roundRect(W/2-52,22,104,26,13);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='500 11px \'Noto Sans TC\',system-ui,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('步驟 '+(pi+1)+' / '+PN,W/2,35);
    // 標題（自動換行，最多兩行）
    {
      const titleText=step.title||'';
      ctx.font='700 15px \'Noto Sans TC\',system-ui,sans-serif';
      ctx.fillStyle='#1E293B';ctx.textAlign='center';ctx.textBaseline='middle';
      const maxTW=W-48;
      if(ctx.measureText(titleText).width<=maxTW){
        ctx.fillText(titleText,W/2,80);
      } else {
        // 折成兩行
        let cut=Math.floor(titleText.length/2);
        while(cut>0&&ctx.measureText(titleText.slice(0,cut)).width>maxTW) cut--;
        ctx.fillText(titleText.slice(0,cut),W/2,70);
        ctx.fillText(titleText.slice(cut),W/2,88);
      }
    }
    // 分隔線
    ctx.strokeStyle='rgba(55,138,221,0.2)';ctx.lineWidth=0.8;ctx.beginPath();ctx.moveTo(50,100);ctx.lineTo(W-50,100);ctx.stroke();
    // 公式（支援自動換行，清除 markdown）
    if(step.formula){
      // 清除 Gemini 的 markdown 語法
      step.formula=step.formula
        .replace(/\*\*([^*]+)\*\*/g,'$1')
        .replace(/\*([^*]+)\*/g,'$1')
        .replace(/`([^`]+)`/g,'$1')
        .replace(/#{1,6}\s*/g,'');
      // 先切分段落（\n 或 ；），再對每段做自動換行
      function wrapLine(ctx,text,maxW,fontSize){
        ctx.font='400 '+fontSize+'px \'Noto Sans TC\',system-ui,sans-serif';
        const words=text.split('');
        let line='',res=[];
        for(const ch of words){
          const test=line+ch;
          if(ctx.measureText(test).width>maxW&&line){res.push(line);line=ch;}
          else line=test;
        }
        if(line)res.push(line);
        return res.length?res:[text];
      }
      const rawLines=step.formula.split(/\\n|\n|；/).filter(l=>l.trim());
      const maxW=W-60;
      // 展開所有折行
      let allLines=[];
      rawLines.forEach((l,i)=>{
        // 行數多時自動縮小字體（最小 11px）
        const fontSize=rawLines.length>4?12:14;
        const wrapped=wrapLine(ctx,l,maxW,fontSize);
        wrapped.forEach((wl,wi)=>allLines.push({text:wl,isFirst:wi===0,groupIdx:i,totalGroups:rawLines.length}));
      });
      allLines.forEach((item,li)=>{
        const ty=118+li*32;if(ty>H-50)return;
        const isLastGroup=item.groupIdx===item.totalGroups-1;
        const fs=rawLines.length>4?12:14;
        ctx.font=(item.groupIdx===0&&item.isFirst?'600':'400')+' '+fs+'px \'Noto Sans TC\',system-ui,sans-serif';
        const tw=ctx.measureText(item.text).width+20;
        const fx=Math.max(20,W/2-tw/2);
        if(item.isFirst){
          ctx.fillStyle=item.groupIdx===0?'rgba(55,138,221,0.1)':'rgba(0,0,0,0.03)';
          ctx.beginPath();ctx.roundRect(fx,ty-13,Math.min(tw,W-40),26,5);ctx.fill();
        }
        ctx.fillStyle=item.groupIdx===0?col:isLastGroup?'#085041':'#64748B';
        ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(item.text,W/2,ty);
      });
    }
    if(pi===PN-1&&e>0.5)ansBox(ctx,W,H,ans);
  });
}

// ── Add result card ───────────────────────────────────
const cardOrigQuery={};
function retryExplain(cardId){
  const inp=document.getElementById('inp');
  if(inp){
    inp.value=cardOrigQuery[cardId]||'';
    autoH(inp);
    inp.focus();
    inp.scrollIntoView({behavior:'smooth',block:'center'});
  }
}
function addResultCard(q,phaseFns,exps,cardId,origQuery){
  const chat=document.getElementById('chat');
  const PN=phaseFns.length;
  cardPhasesList[cardId]=phaseFns;cardPhases[cardId]=0;
  cardOrigQuery[cardId]=origQuery||q||'';
  const colors=['bl','am','gr'];
  // 整理老師說明資料，過濾掉標題與內容都空白的項目，避免顯示異常
  let safeExps=[];
  try{
    safeExps=(Array.isArray(exps)?exps:[]).filter(ex=>ex&&((ex.title&&String(ex.title).trim())||(ex.body&&String(ex.body).trim())));
  }catch(e){safeExps=[];}
  function rowColor(i){if(i===safeExps.length-1)return 'gr';return colors[i%3];}
  let exHtml='';
  try{
    exHtml=safeExps.map((ex,i)=>{
      const col=rowColor(i),phase=i+1;
      const title=escapeHtml(ex.title||'說明');
      // 清除 Gemini 輸出的 markdown 符號，再換行
      const rawBody=(ex.body||'')
        .replace(/\*\*([^*]+)\*\*/g,'$1')   // **粗體** → 純文字
        .replace(/\*([^*]+)\*/g,'$1')         // *斜體* → 純文字
        .replace(/`([^`]+)`/g,'$1')            // `code` → 純文字
        .replace(/#{1,6}\s*/g,'')             // # 標題符號
        .trim();
      const body=escapeHtml(rawBody).replace(/\n/g,'<br>');
      return '<div class="erow '+col+'" id="row_'+cardId+'_'+i+'">'+'<div class="erow-icon">'+(i+1)+'</div>'+'<div class="erow-content">'+'<div class="et">'+title+'<span class="step-tag">步驟 '+phase+'</span></div>'+'<div class="ed">'+body+'</div>'+'</div></div>';
    }).join('');
  }catch(e){exHtml='';}
  // 萬一說明真的無法產生，顯示明確提示，避免同學以為系統壞掉
  if(!exHtml.trim()){
    exHtml='<div class="erow-fallback">'
      +'<div class="erow-fallback-txt">這題的文字說明暫時沒有顯示出來，不是壞掉喔！左側的解題圖示一樣可以正常操作，你可以點下面的按鈕重新送出題目，再產生一次說明。</div>'
      +'<button class="erow-retry-btn" onclick="retryExplain(\''+cardId+'\')">🔄 重新送出題目</button>'
      +'</div>';
  }
  const safeQ=escapeHtml(q);
  const dotsHtml=phaseFns.map((_,i)=>'<button class="dot'+(i===0?' on':'')+'" onclick="jumpTo(\''+cardId+'\','+i+')" aria-label="步驟'+(i+1)+'"></button>').join('');
  const wrap=document.createElement('div');wrap.className='msg result-msg';
  wrap.innerHTML='<div class="msg-av" style="margin-top:2px">AI</div>'
    +'<div class="result-wrap">'
    // 題目 bar 跨兩欄
    +'<div class="q-bar">'
    +'<span class="q-num">題目</span><span class="q-txt">'+safeQ+'</span></div>'
    // 左欄：圖形
    +'<div class="result-card">'
    +'<canvas id="cv_'+cardId+'" width="560" height="380" style="display:block;width:100%;height:auto;background:#F0F5FB"></canvas>'
    +'<div class="res-ctrl">'
    +'<button id="bp_'+cardId+'" onclick="cardPrev(\''+cardId+'\')" disabled>← 上一步</button>'
    +'<div class="ctrl-dots" id="dots_'+cardId+'">'+dotsHtml+'</div>'
    +'<button id="bn_'+cardId+'" onclick="cardNext(\''+cardId+'\')" class="pr">下一步 →</button>'
    +'</div></div>'
    // 右欄：說明
    +'<div class="explain-card">'
    +'<div class="explain-hdr"><div class="ex-av">AI</div><div class="ex-name">老師說明</div></div>'
    +'<div class="explain-body" id="ex_'+cardId+'">'+exHtml+'</div>'
    +'</div>'
    +'</div>';
  chat.appendChild(wrap);chat.scrollTop=chat.scrollHeight;
  setTimeout(()=>{const cv=document.getElementById('cv_'+cardId);if(cv&&phaseFns[0]){const ctx=cv.getContext('2d');ctx.clearRect(0,0,cv.width,cv.height);phaseFns[0](ctx,cv.width,cv.height,1);}syncUI(cardId);},60);
}

// ── System prompt ─────────────────────────────────────
const SYS='你是育達補習班AI老師，只回傳純JSON不加任何說明、不使用markdown（禁止用**、*、`、#）：\n{"question":"題目20字","graphType":"類型","graphParams":{},"explanations":[{"title":"標題","body":"詳細說明文字，至少2句話"}],"phases":[{"title":"步名","formula":"算式或說明"}],"answer":"答案"}\n\n【graphType 完整選擇表】\n數學/機件：triangle；quadratic；sincos；pythagorean；rlc；vt；spring；gear；pulley；circle；circular_motion；vector；linear；linear_programming；dc_circuit；power；friction_disc。\n土木/機械力學→static_force。電機電子/資訊→logic_gate；transistor。商管會計→accounting。\n國文/閱讀測驗（含圖表判讀）→reading_chart。英文閱讀→english_reading；文法/克漏字→english_grammar；翻譯/作文→english_writing。\n化工/商管計算→calculation；非數學圖表判讀→chart_mcq；觀念/名詞解釋→concept_mcq；流程圖→process_flow。\n其他→text。\n\n【static_force 格式 - 靜力學/梁的反力/力矩】\ngraphParams:{beamLen:梁長公尺,loadType:"point或distributed",fy:力kN,dist:距A點距離公尺,reactionA:RA值,reactionB:RB值,angle:斜力角度(無斜力填0)}。\nphases 4個：phases[0]畫自由體圖標外力,phases[1]對A點取力矩求RB,phases[2]由ΣFy=0求RA,phases[3]驗算。explanations同4個。\n\n【logic_gate 格式 - 邏輯閘/真值表】\ngraphParams:{gate:"AND或OR或NOT或NAND或NOR或XOR或XNOR",inputs:["A","B"],expression:"布林表示式"}。\nphases 4個：phases[0]認識閘符號與邏輯運算,phases[1]列出真值表輸入組合,phases[2]逐行計算輸出,phases[3]確認答案。explanations同4個。\n\n【accounting 格式 - 借貸分錄/T字帳】\ngraphParams:{accounts:[{name:"帳戶名",debit:借方金額,credit:貸方金額}],equation:{assets:資產,liabilities:負債,equity:業主權益}}。accounts最多4個。\nphases 4個：phases[0]分析交易本質,phases[1]判斷借貸方向（資產增→借方；負債增→貸方），phases[2]填寫分錄,phases[3]過帳T字帳確認餘額。explanations同4個。\n\n【transistor 格式 - 電晶體特性曲線/工作點】\ngraphParams:{type:"BJT或FET",VCC:電源電壓,RC:集極電阻kΩ,IB:基極電流mA,hFE:電流增益,curves:[{ib:基極電流,ic:集極電流}]}。\nphases 4個：phases[0]認識特性曲線族,phases[1]畫直流負載線（兩端點：飽和點與截止點）,phases[2]找工作點Q（負載線與IB曲線交點）,phases[3]計算VCE與IC。explanations同4個。\n\n【reading_chart 格式 - 閱讀測驗/圖表判讀】\ngraphParams:{chartDesc:"圖表結構（座標軸/象限意義）"}。phases 4個：phases[0]讀懂圖表結構,phases[1]找出人物具體行為（引用原文），phases[2]行為對應座標位置,phases[3]逐一比對選項。禁止直接猜答案。\n\n【english_reading 格式】graphParams:{}。phases 4個：主題/關鍵字,題目定位,關鍵句解析,選項逐一分析。\n【english_grammar 格式】graphParams:{}。phases 4個：辨識題型,文法規則,代入驗證,確認+口訣。\n【english_writing 格式】graphParams:{}。phases 3個：句型分析,詞組示範,完整答案。\n【concept_mcq 格式】graphParams:{}。phases 4個：核心概念,定義說明,選項分析,答案+口訣。\n【chart_mcq 格式】graphParams:{chartDesc:"圖表說明"}。phases 4個：圖表結構,題目問什麼,對應位置,比對選項。\n【calculation 格式】graphParams:{}。phases 4個：已知整理,公式,代入計算,答案+單位。\n【process_flow 格式】graphParams:{steps:["步驟1",...]}，steps最多6個，phases數量=steps數量。\n\n【數學/機件格式（既有）】\ntriangle:{AB,AC,BC,angleA,angleB,angleC}。circle:{h,k,r,nh,nk,nr}。circular_motion:{R,mu,g}。linear_programming:phases剛好4個,phases[0]含不等式,phases[1]目標函數,phases[2]頂點列表,phases[3]最優解。friction_disc:{Ro,Ri,mu,T,Ravg,F}，Ro/Ri/Ravg單位mm，T單位N-cm。\n\nphases和explanations數量必須相等。計算題計算後驗算答案。';

// ── Send ──────────────────────────────────────────────
async function send(){
  const inp=document.getElementById('inp');const q=inp.value.trim();
  if(!q&&!pendingImg)return;
  inp.value='';inp.style.height='40px';
  document.getElementById('sendBtn').disabled=true;
  const dispQ=q||(pendingImg?'（圖片題目）':'');
  if(pendingImg){
    const d=document.createElement('div');d.className='msg user';
    d.innerHTML='<div class="bub"><img src="data:image/jpeg;base64,'+pendingImg+'" style="max-width:160px;border-radius:6px;display:block;margin-bottom:4px">'+escapeHtml(q||'請解這道題')+'</div>';
    document.getElementById('chat').appendChild(d);document.getElementById('chat').scrollTop=99999;
  }else{addMsg('user',q);}
  showTyping();

  // 組合 prompt
  let fullPrompt=SYS+'\n\n題目：'+q;
  if(pendingImg) fullPrompt=SYS+'\n\n請仔細看圖片中的題目，完整解題。補充說明：'+(q||'請解這道題');

  try{
    const payload={studentId:studentId, prompt:fullPrompt};
    if(pendingImg) payload.image=pendingImg;
    const res=await fetch(WORKERS_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    if(!res.ok){
      removeTyping();
      let statusMsg='';
      if(res.status===503||res.status===502) statusMsg='AI 伺服器暫時忙碌中，請等待 10 秒後再重新送出題目。';
      else if(res.status===429) statusMsg='使用太頻繁，請等待約 30 秒後再試。';
      else if(res.status===401||res.status===403) statusMsg='驗證失敗，請重新整理頁面後再試。';
      else statusMsg='伺服器暫時無法使用（'+res.status+'），請稍後再試。';
      addMsg('ai',statusMsg);
      document.getElementById('sendBtn').disabled=false;
      return;
    }
    const data=await res.json();
    if(data.error){
      removeTyping();
      const errCode=data.error?.code||0;
      const errMsg=typeof data.error==='object'?(data.error.message||''):data.error;
      const errStatus=data.error?.status||'';
      let msg='';
      if(errCode===503||errMsg.includes('high demand')||errMsg.includes('UNAVAILABLE')) msg='AI 伺服器目前流量較大，請稍等幾秒後再試一次。';
      else if(errCode===429||errMsg.includes('quota')||errMsg.includes('exceeded')||errStatus==='RESOURCE_EXHAUSTED') msg='使用次數暫時達到上限（每分鐘最多20次），請等待約30秒後再試。';
      else if(errCode===400) msg='題目格式有問題，請換個方式輸入後再試。';
      else if(errCode===401||errCode===403) msg='驗證失敗，請重新整理頁面後再試。';
      else msg='AI 服務暫時無法使用，請稍後再試。';
      addMsg('ai',msg);
      document.getElementById('sendBtn').disabled=false;
      return;
    }
    // Workers 使用 Gemini API，格式為 data.candidates[0].content.parts[0].text
    let raw='{}';
    if(data.candidates?.[0]?.content?.parts?.[0]?.text){
      raw=data.candidates[0].content.parts[0].text;
    } else if(data.candidates?.[0]?.content?.parts){
      raw=data.candidates[0].content.parts.map(p=>p.text||'').join('');
    } else if(typeof data.text==='string'){
      raw=data.text;
    } else if(typeof data.result==='string'){
      raw=data.result;
    } else {
      const dataPreview=JSON.stringify(data).slice(0,400);
      removeTyping();
      addMsg('ai','⚠️ AI 回傳格式無法解析，請重新送出題目。<br><code style="font-size:11px;word-break:break-all;background:#F7F9FC;padding:6px;border-radius:6px;display:block;margin-top:6px">'+escapeHtml(dataPreview)+'</code>');
      document.getElementById('sendBtn').disabled=false;
      return;
    }
    // 清理 markdown 包裹
    raw=raw.replace(/^```json\s*/,'').replace(/\s*```$/,'').trim();
    raw=raw.replace(/^```\s*/,'').replace(/\s*```$/,'').trim();
    // 找出 JSON 主體
    const first=raw.indexOf('{'),last=raw.lastIndexOf('}');
    if(first!==-1&&last!==-1) raw=raw.slice(first,last+1);
    // ── 智慧 JSON 修復函數 ───────────────────────────
    function tryRepairJson(s){
      // 策略1：用狀態機找到最後一個完整物件
      try{
        let depth=0,inStr=false,esc=false,lastComplete=-1;
        for(let i=0;i<s.length;i++){
          const c=s[i];
          if(esc){esc=false;continue;}
          if(c==='\\'){esc=true;continue;}
          if(c==='"'&&!esc){inStr=!inStr;continue;}
          if(inStr)continue;
          if(c==='{')depth++;
          else if(c==='}'){depth--;if(depth===0)lastComplete=i;}
        }
        if(lastComplete>0){const t=s.slice(0,lastComplete+1);return JSON.parse(t);}
      }catch(e){}
      // 策略2：截斷到最後一個完整的字串值後補括號
      try{
        // 找最後一個完整的 "key":"value" 配對後截斷
        const lastComma=s.lastIndexOf(',"');
        const lastColon=s.lastIndexOf('":');
        const cutAt=Math.max(lastComma,s.lastIndexOf('"}')); 
        if(cutAt>100){
          let fixed=s.slice(0,cutAt+2);
          // 清除最後不完整的 key
          fixed=fixed.replace(/,"[^"]*$/,'');
          // 補閉合符號（由內而外）
          const stk=[];
          let inS=false,es=false;
          for(const c of fixed){
            if(es){es=false;continue;}
            if(c==='\\'){es=true;continue;}
            if(c==='"'){inS=!inS;continue;}
            if(inS)continue;
            if(c==='{'||c==='[')stk.push(c);
            else if(c==='}'||c===']')stk.pop();
          }
          for(let i=stk.length-1;i>=0;i--) fixed+=(stk[i]==='{'?'}':']');
          return JSON.parse(fixed);
        }
      }catch(e){}
      return null;
    }
    function extractPartialJson(s){
      // 最後手段：用正規表示式硬挖關鍵欄位
      try{
        const qm=s.match(/"question"\s*:\s*"([^"]+)"/);
        const gm=s.match(/"graphType"\s*:\s*"([^"]+)"/);
        const am=s.match(/"answer"\s*:\s*"([^"]+)"/);
        if(qm){return {question:qm[1],graphType:gm?gm[1]:'text',graphParams:{},phases:[{title:'解題過程',formula:am?am[1]:''}],answer:am?am[1]:'',explanations:[]};}
      }catch(e){}
      return null;
    }

    let obj;
    try{
      obj=JSON.parse(raw);
      console.log('✅ JSON 解析成功，graphType=',obj.graphType,'phases=',obj.phases?.length,'explanations=',obj.explanations?.length);
    }catch(e){
      obj=tryRepairJson(raw)||extractPartialJson(raw);
      if(!obj){
        removeTyping();
        // 顯示原始回傳，方便除錯
        const preview=raw.length>300?raw.slice(0,300)+'…':raw;
        addMsg('ai','⚠️ JSON 解析失敗（格式：'+detectedFmt+'）<br><br><code style="font-size:11px;word-break:break-all;background:#F7F9FC;padding:6px;border-radius:6px;display:block">'+escapeHtml(preview)+'</code>');
        document.getElementById('sendBtn').disabled=false;
        return;
      }
    }
    // 關鍵欄位截斷補救
    if(!Array.isArray(obj.phases)||obj.phases.length===0)
      obj.phases=[{title:'解題過程',formula:obj.answer||''}];
    if(!Array.isArray(obj.explanations)||obj.explanations.length===0){
      // explanations 被截斷時，從 phases 自動重建有意義的說明
      obj.explanations=obj.phases.map((p,i)=>{
        const formulas=(p.formula||'').split(/\\n|；|;/).filter(l=>l.trim());
        const body=formulas.length>1
          ?'計算步驟：\n'+formulas.join('\n')
          :p.formula?('計算：'+p.formula):'此步驟請對照左側圖形。';
        return {title:p.title||('步驟 '+(i+1)),body};
      });
    }
    if(obj.graphType&&obj.graphType!=='text'&&(!obj.graphParams||typeof obj.graphParams!=='object'))
      obj.graphType='text';
    removeTyping();clearImg();
    const cardId='c'+Date.now();
    // 確保老師說明數量至少與計算步驟數量一致，避免AI回傳不完整時右側說明只剩一兩步
    const phasesArr=Array.isArray(obj.phases)?obj.phases:[];
    let explanationsArr=Array.isArray(obj.explanations)?obj.explanations.slice():[];
    for(let i=explanationsArr.length;i<phasesArr.length;i++){
      const ph=phasesArr[i]||{};
      explanationsArr.push({
        title: ph.title||('步驟 '+(i+1)),
        body: ph.formula?('這一步的計算：'+ph.formula):'這個步驟的詳細說明暫時沒有顯示出來，可以參考左側圖示的計算過程。'
      });
    }
    addResultCard(obj.question||dispQ,buildPhaseFns(obj),explanationsArr,cardId,dispQ);
  }catch(err){
    removeTyping();
    let msg='發生錯誤，請稍後再試。';
    if(err.message.includes('Failed to fetch')||err.message.includes('NetworkError')) msg='網路連線失敗，請確認網路後再試。';
    else if(err.message.includes('timeout')||err.message.includes('Timeout')) msg='連線逾時，伺服器回應太慢，請稍後再試。';
    else if(err.message.includes('503')||err.message.includes('UNAVAILABLE')) msg='AI 伺服器目前流量較大，請等待幾秒後再試一次。';
    else if(err.message.includes('401')||err.message.includes('403')) msg='身分驗證失敗，請重新登入。';
    addMsg('ai',msg);
  }  document.getElementById('sendBtn').disabled=false;
}
</script>
